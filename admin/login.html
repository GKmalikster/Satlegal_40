<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – SatLegal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }
    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo img { height: 40px; }
    h1 {
      font-size: 20px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      color: #f1f5f9;
    }
    label {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7c3aed; }
    button {
      width: 100%;
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #6d28d9; }
    button:disabled { background: #4c1d95; cursor: not-allowed; }
    .error {
      background: #7f1d1d;
      border: 1px solid #ef4444;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="/images/logo.png" alt="SatLegal" onerror="this.style.display='none'">
    </div>
    <h1>🔒 Admin Login</h1>
    <div class="error" id="errMsg"></div>
    <form id="loginForm">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@satlegal.in" required autocomplete="username">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      <button type="submit" id="btn">Sign In</button>
    </form>
  </div>

  <script>
    // If already logged in, redirect
    if (localStorage.getItem('sl_admin_token')) {
      window.location.href = '/admin/dashboard.html';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errMsg = document.getElementById('errMsg');
      errMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.success && data.token) {
          localStorage.setItem('sl_admin_token', data.token);
          window.location.href = '/admin/dashboard.html';
        } else {
          errMsg.textContent = data.message || 'Invalid credentials';
          errMsg.style.display = 'block';
        }
      } catch (err) {
        errMsg.textContent = 'Network error. Please try again.';
        errMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
