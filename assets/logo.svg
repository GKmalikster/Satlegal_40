<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <radialGradient id="pg2" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#2d2d2d"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="rg2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C0392B"/>
      <stop offset="60%" stop-color="#922B21"/>
      <stop offset="100%" stop-color="#5D1A16"/>
    </radialGradient>
  </defs>

  <!-- Ring back half (behind planet) -->
  <ellipse cx="30" cy="30" rx="28" ry="7.5"
    fill="none" stroke="url(#rg2)" stroke-width="5.5" opacity="0.5"
    stroke-dasharray="88 88" stroke-dashoffset="0"
    transform="rotate(-16,30,30)"/>

  <!-- Planet sphere -->
  <circle cx="30" cy="30" r="21" fill="url(#pg2)"/>

  <!-- Planet highlight / shine -->
  <ellipse cx="23" cy="22" rx="7" ry="4.5" fill="rgba(255,255,255,0.11)"/>

  <!-- Ring front half (in front of planet) -->
  <ellipse cx="30" cy="30" rx="28" ry="7.5"
    fill="none" stroke="url(#rg2)" stroke-width="6.5"
    stroke-dasharray="88 88" stroke-dashoffset="88"
    transform="rotate(-16,30,30)"/>

  <!-- Divider line -->
  <line x1="66" y1="12" x2="66" y2="50" stroke="#ddd" stroke-width="1"/>

  <!-- SatLegal brand name -->
  <text x="78" y="36" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="24" font-weight="900" letter-spacing="-0.6">
    <tspan fill="#111111">Sat</tspan><tspan fill="#1a6b1a">Legal</tspan>
  </text>

  <!-- Tagline -->
  <text x="79" y="49" font-family="'Segoe UI',system-ui,Arial,sans-serif" font-size="10.5" fill="#666" letter-spacing="0.5">Legalities Simplified</text>
</svg>
