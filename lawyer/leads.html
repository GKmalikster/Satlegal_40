<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>My Leads – SatLegal</title>
<style>
:root{
  --sf-500:#FF9933;--sf-600:#FF8800;--sf-700:#E07000;--sf-800:#B35100;
  --sf-100:#FFF4E6;--sf-200:#FFE4C2;--sf-50:#FFFAF4;
  --gr-500:#138808;--gr-600:#1A6B1A;--gr-700:#145214;--gr-800:#0D3D0D;--gr-900:#062206;
  --gr-50:#F0FBF0;--gr-100:#D4F5D2;--gr-200:#A8E8A4;--gr-400:#2EAD22;
  --danger:#C0392B;--danger-lt:#FDECEA;
  --text:#1A1A1A;--text-lt:#6B7280;--border:#E5E7EB;--bg:#F4F6F8;
  --white:#fff;--shadow:0 2px 10px rgba(0,0,0,.07);--r:8px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);color:var(--text);background:var(--bg);line-height:1.5;}
a{text-decoration:none;color:inherit;}

/* ── Nav ── */
.navbar{height:62px;background:var(--white);border-bottom:3px solid transparent;border-image:linear-gradient(to right,var(--sf-500) 33%,#fff 33% 66%,var(--gr-500) 66%) 1;display:flex;align-items:center;padding:0 28px;gap:20px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.brand{font-size:21px;font-weight:900;letter-spacing:-.5px;}
.brand span:first-child{color:var(--sf-600);}
.brand span:last-child{color:var(--gr-600);}
.nav-mid{display:flex;gap:4px;flex:1;}
.nav-mid a{font-size:13px;font-weight:600;color:var(--text-lt);padding:6px 13px;border-radius:6px;transition:.15s;}
.nav-mid a:hover,.nav-mid a.active{color:var(--gr-700);background:var(--gr-50);}
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.avatar-pill{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 12px 4px 6px;font-size:13px;font-weight:600;color:var(--gr-800);}
.avatar-circle{width:28px;height:28px;border-radius:50%;background:var(--gr-500);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:var(--r);border:none;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;white-space:nowrap;font-family:var(--font);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-xs{padding:4px 9px;font-size:11px;}
.btn-success{background:var(--gr-500);color:#fff;}
.btn-success:hover{background:var(--gr-700);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{background:#962D22;color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--sf-500);color:var(--sf-700);}
.btn-outline:hover{background:var(--sf-500);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-lt);}
.btn-ghost:hover{border-color:var(--gr-400);color:var(--gr-700);background:var(--gr-50);}
.btn-danger-outline{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
.btn-danger-outline:hover{background:var(--danger);color:#fff;}
.btn:disabled{opacity:.45;cursor:not-allowed;}

/* ── Page ── */
.page{max-width:960px;margin:0 auto;padding:24px 20px 60px;}
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px;}
.page-hdr h1{font-size:22px;font-weight:900;color:var(--gr-800);}

/* ── Filter tabs ── */
.tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--white);margin-bottom:20px;flex-wrap:wrap;}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--text-lt);cursor:pointer;border:none;background:none;font-family:var(--font);transition:.15s;border-right:1px solid var(--border);}
.tab:last-child{border-right:none;}
.tab:hover{background:var(--gr-50);color:var(--gr-700);}
.tab.active{background:var(--gr-800);color:#fff;}
.tab .cnt{font-size:11px;opacity:.8;margin-left:4px;}

/* ── Stats bar ── */
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-chip{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:6px;}
.stat-chip strong{font-size:18px;font-weight:900;color:var(--gr-800);}
.stat-chip span{color:var(--text-lt);}

/* ── Lead card ── */
.lead-card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;margin-bottom:14px;overflow:hidden;transition:box-shadow .2s;}
.lead-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.09);}
.lead-card.status-new{border-left:4px solid var(--sf-500);}
.lead-card.status-accepted{border-left:4px solid var(--gr-500);}
.lead-card.status-completed{border-left:4px solid var(--gr-700);}
.lead-card.status-rejected{border-left:4px solid var(--danger);}
.lead-card.status-viewed{border-left:4px solid #94A3B8;}

/* ── Lead card header ── */
.lead-head{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none;}
.lead-head:hover{background:var(--gr-50);}
.urgency-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.urg-high{background:#EF4444;box-shadow:0 0 0 3px rgba(239,68,68,.2);}
.urg-medium{background:var(--sf-500);}
.urg-low{background:var(--gr-500);}
.lead-head-main{flex:1;min-width:0;}
.lead-case-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px;}
.case-tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--gr-50);color:var(--gr-700);border:1px solid var(--gr-100);}
.lead-desc-preview{font-size:13px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:500px;}
.lead-meta-row{display:flex;align-items:center;gap:12px;margin-top:4px;font-size:11px;color:var(--text-lt);}
.lead-head-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.badge-new{background:var(--sf-100);color:var(--sf-800);}
.badge-accepted{background:var(--gr-100);color:var(--gr-800);}
.badge-completed{background:var(--gr-50);color:var(--gr-700);border:1px solid var(--gr-200);}
.badge-rejected{background:var(--danger-lt);color:var(--danger);}
.badge-viewed{background:#F1F5F9;color:#475569;}
.badge-high{background:#FEE2E2;color:#B91C1C;}
.badge-medium{background:var(--sf-100);color:var(--sf-800);}
.badge-low{background:var(--gr-50);color:var(--gr-700);}
.chevron{font-size:16px;color:var(--text-lt);transition:transform .2s;}
.open .chevron{transform:rotate(180deg);}

/* ── Lead card body (expandable) ── */
.lead-body{display:none;border-top:1px solid var(--border);padding:20px;}
.lead-body.open{display:block;}

/* Sections within body */
.body-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
@media(max-width:640px){.body-grid{grid-template-columns:1fr;}}

.info-section{background:var(--bg);border-radius:var(--r);padding:16px;}
.info-section-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:var(--text-lt);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.info-row{display:flex;flex-direction:column;margin-bottom:8px;}
.info-label{font-size:11px;color:var(--text-lt);font-weight:600;}
.info-val{font-size:14px;color:var(--text);font-weight:500;}
.info-val a{color:var(--gr-600);text-decoration:underline;}

/* Case description */
.case-desc-full{font-size:14px;line-height:1.7;color:var(--text);background:var(--bg);padding:14px;border-radius:var(--r);margin-bottom:16px;}

/* Applicable laws */
.laws-section{margin-bottom:16px;}
.laws-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:var(--text-lt);margin-bottom:10px;}
.law-row{display:flex;align-items:flex-start;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;background:var(--white);}
.law-row:last-child{margin:0;}
.law-conf-circle{width:44px;height:44px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;border:3px solid;}
.conf-high{border-color:var(--gr-500);color:var(--gr-600);}
.conf-med{border-color:var(--sf-500);color:var(--sf-700);}
.conf-low{border-color:#94A3B8;color:#475569;}
.law-row-details{flex:1;min-width:0;}
.law-name{font-size:14px;font-weight:700;color:var(--gr-800);}
.law-act{font-size:12px;color:var(--text-lt);margin-top:2px;}
.law-sections{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.law-sec-tag{font-size:11px;background:var(--sf-50);color:var(--sf-800);border:1px solid var(--sf-200);border-radius:3px;padding:1px 6px;}

/* Probability score */
.prob-section{margin-bottom:16px;}
.prob-card{display:flex;align-items:center;gap:14px;padding:14px;border:1px solid var(--border);border-radius:var(--r);background:var(--white);margin-bottom:8px;}
.prob-circle{width:60px;height:60px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;border:4px solid;}
.prob-high{border-color:var(--gr-500);color:var(--gr-600);}
.prob-med{border-color:var(--sf-500);color:var(--sf-700);}
.prob-low{border-color:var(--danger);color:var(--danger);}
.prob-label{font-size:10px;font-weight:600;}
.prob-details{flex:1;}
.prob-type{font-size:14px;font-weight:700;color:var(--gr-800);margin-bottom:6px;}
.prob-bars{display:flex;flex-direction:column;gap:4px;}
.prob-bar-row{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-lt);}
.prob-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.prob-bar-fill{height:100%;border-radius:3px;background:var(--gr-500);}

/* Documents */
.docs-section{margin-bottom:16px;}
.doc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px;background:var(--white);}
.doc-item:last-child{margin:0;}
.doc-icon{font-size:20px;flex-shrink:0;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-meta{font-size:11px;color:var(--text-lt);margin-top:2px;}
.doc-actions{flex-shrink:0;}
.doc-pending{font-size:12px;color:var(--text-lt);font-style:italic;}

/* Actions panel */
.actions-panel{background:linear-gradient(135deg,var(--gr-50),var(--sf-50));border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-top:16px;}
.actions-panel-title{font-size:13px;font-weight:800;color:var(--gr-800);margin-bottom:14px;}
.actions-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.notes-area{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);resize:vertical;min-height:80px;outline:none;transition:border-color .2s;}
.notes-area:focus{border-color:var(--sf-500);box-shadow:0 0 0 3px rgba(255,153,51,.15);}
.notes-label{font-size:12px;font-weight:600;color:var(--text-lt);margin-bottom:6px;display:block;}
.fee-input-row{display:flex;gap:10px;align-items:center;margin-top:12px;flex-wrap:wrap;}
.fee-wrap{display:flex;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:.2s;}
.fee-wrap:focus-within{border-color:var(--sf-500);}
.fee-prefix{padding:8px 10px;background:var(--bg);border-right:1px solid var(--border);font-weight:700;color:var(--text-lt);display:flex;align-items:center;font-size:14px;}
.fee-wrap input{border:none;padding:8px 12px;font-size:13px;font-family:var(--font);outline:none;width:120px;}
.save-btn-row{display:flex;justify-content:flex-end;margin-top:12px;}

/* Contact unlock */
.contact-locked{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-lt);font-style:italic;padding:10px;background:var(--bg);border-radius:6px;}

/* Empty / Loading */
.empty{text-align:center;padding:60px 20px;color:var(--text-lt);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty p{font-size:15px;}
.loading-row{display:flex;align-items:center;justify-content:center;gap:10px;padding:50px;color:var(--text-lt);}
.spinner{width:22px;height:22px;border:3px solid var(--sf-200);border-top-color:var(--sf-500);border-right-color:var(--gr-500);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--gr-800);color:#fff;padding:12px 20px;border-radius:var(--r);font-size:14px;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none;z-index:9999;max-width:340px;}
#toast.show{display:block;animation:toastIn .3s ease;}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="brand"><span>Sat</span><span>Legal</span></a>
  <div class="nav-mid">
    <a href="/lawyer/dashboard.html">📊 Dashboard</a>
    <a href="/lawyer/leads.html" class="active">📋 My Leads</a>
    <a href="/lawyer/profile.html" id="profileLink">👤 Public Profile</a>
  </div>
  <div class="nav-right">
    <div class="avatar-pill">
      <div class="avatar-circle" id="avatarInitial">?</div>
      <span id="navName">Loading…</span>
    </div>
    <button class="btn btn-danger-outline btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="page">
  <div class="page-hdr">
    <h1>📋 My Leads</h1>
    <div id="pageSubtitle" style="font-size:14px;color:var(--text-lt)">Loading…</div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-chip"><strong id="stTotal">—</strong><span>Total</span></div>
    <div class="stat-chip"><strong id="stNew">—</strong><span>New</span></div>
    <div class="stat-chip"><strong id="stAccepted">—</strong><span>Active</span></div>
    <div class="stat-chip"><strong id="stCompleted">—</strong><span>Completed</span></div>
    <div class="stat-chip"><strong id="stClosure">—%</strong><span>Closure Rate</span></div>
  </div>

  <!-- Filter tabs -->
  <div class="tabs">
    <button class="tab active" data-status="" onclick="switchTab(this)">All <span class="cnt" id="cntAll"></span></button>
    <button class="tab" data-status="new" onclick="switchTab(this)">🔔 New <span class="cnt" id="cntNew"></span></button>
    <button class="tab" data-status="viewed" onclick="switchTab(this)">👁 Viewed <span class="cnt" id="cntViewed"></span></button>
    <button class="tab" data-status="accepted" onclick="switchTab(this)">✅ Active <span class="cnt" id="cntAccepted"></span></button>
    <button class="tab" data-status="completed" onclick="switchTab(this)">🏆 Completed <span class="cnt" id="cntCompleted"></span></button>
    <button class="tab" data-status="rejected" onclick="switchTab(this)">✕ Rejected <span class="cnt" id="cntRejected"></span></button>
  </div>

  <!-- Lead list -->
  <div id="leadsList">
    <div class="loading-row"><div class="spinner"></div> Loading leads…</div>
  </div>
</div>

<script>
// ── Session ──────────────────────────────────────────────────────────────────
function getSession() {
  const token = localStorage.getItem('sl_token');
  const raw   = localStorage.getItem('sl_user');
  if (!token || !raw) return null;
  try {
    const user = JSON.parse(raw);
    if (user.role !== 'lawyer') return null;
    return { token, user };
  } catch { return null; }
}
const session = getSession();
if (!session) {
  window.location.href = '/auth/login.html?redirect=' + encodeURIComponent(location.pathname);
}
function logout() {
  localStorage.removeItem('sl_token');
  localStorage.removeItem('sl_user');
  window.location.href = '/auth/login.html';
}

// ── State ────────────────────────────────────────────────────────────────────
let currentStatus  = new URLSearchParams(location.search).get('status') || '';
let allLeads       = [];
let currentStats   = {};

// ── Helpers ──────────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function timeAgo(d) {
  if (!d) return '';
  const diff = (Date.now() - new Date(d)) / 1000;
  if (diff < 60)    return 'just now';
  if (diff < 3600)  return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function showToast(msg, ok = true) {
  const t = $('toast');
  t.textContent = msg;
  t.style.background = ok ? 'var(--gr-800)' : 'var(--danger)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function docIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  const m = { pdf:'📄', doc:'📝', docx:'📝', jpg:'🖼️', jpeg:'🖼️', png:'🖼️', xlsx:'📊', xls:'📊', mp4:'🎥', mp3:'🎵' };
  return m[ext] || '📎';
}

function confClass(pct) {
  if (pct >= 70) return 'conf-high';
  if (pct >= 40) return 'conf-med';
  return 'conf-low';
}

function probClass(score) {
  if (score >= 65) return 'prob-high';
  if (score >= 40) return 'prob-med';
  return 'prob-low';
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadLeads(status = '') {
  $('leadsList').innerHTML = '<div class="loading-row"><div class="spinner"></div> Loading…</div>';
  try {
    const url = '/api/lawyer/leads' + (status ? '?status=' + status : '') + '&limit=50';
    const res  = await fetch(url, { headers: { Authorization: 'Bearer ' + session.token } });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    allLeads     = data.leads;
    currentStats = data.stats;

    renderStats(data.stats);
    renderLeads(data.leads);

    // Update tab counts
    $('cntAll').textContent      = '(' + data.stats.total + ')';
    $('cntNew').textContent      = '(' + data.stats.new + ')';
    $('cntViewed').textContent   = '(' + (data.stats.viewed||0) + ')';
    $('cntAccepted').textContent = '(' + data.stats.accepted + ')';
    $('cntCompleted').textContent= '(' + data.stats.completed + ')';
    $('cntRejected').textContent = '(' + data.stats.rejected + ')';

    $('pageSubtitle').textContent = data.total + ' lead' + (data.total !== 1 ? 's' : '') + (status ? ' · filtered by ' + status : '');
  } catch (e) {
    console.error(e);
    $('leadsList').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Could not load leads. ${esc(e.message)}</p></div>`;
  }
}

function renderStats(s) {
  $('stTotal').textContent    = s.total;
  $('stNew').textContent      = s.new;
  $('stAccepted').textContent = s.accepted;
  $('stCompleted').textContent= s.completed;
  $('stClosure').textContent  = s.closureRate + '%';
}

function renderLeads(leads) {
  // Set navbar
  $('navName').textContent = session.user.name?.split(' ')[0] || 'Lawyer';
  $('avatarInitial').textContent = (session.user.name || 'L')[0].toUpperCase();

  if (!leads || !leads.length) {
    $('leadsList').innerHTML = `
      <div class="empty">
        <div class="empty-icon">📭</div>
        <p>No leads found${currentStatus ? ' with status "' + currentStatus + '"' : ''}.<br>
        ${currentStatus ? '<a href="/lawyer/leads.html" style="color:var(--gr-600)">View all leads →</a>' : 'Your profile will start receiving leads once approved.'}</p>
      </div>`;
    return;
  }

  $('leadsList').innerHTML = leads.map(l => buildLeadCard(l)).join('');
}

// ── Build individual lead card ───────────────────────────────────────────────
function buildLeadCard(l) {
  const inq = l.inquiry || {};
  const laws = inq.applicableLaws || [];
  const docs = inq.documents || [];
  const probs = inq.probabilityScores || [];

  // Status badge
  const badgeClass = { new:'badge-new', accepted:'badge-accepted', completed:'badge-completed', rejected:'badge-rejected', viewed:'badge-viewed' };
  const urgClass   = { high:'urg-high', medium:'urg-medium', low:'urg-low' };

  // Laws section
  const lawsHtml = laws.length ? `
    <div class="laws-section">
      <div class="laws-title">⚖️ Applicable Laws (${laws.length})</div>
      ${laws.slice(0, 5).map(law => {
        const conf = Math.round((law.confidence || 0) * 100);
        return `
        <div class="law-row">
          <div class="law-conf-circle ${confClass(conf)}">
            <span>${conf}%</span>
          </div>
          <div class="law-row-details">
            <div class="law-name">${esc(law.caseType || '')}</div>
            <div class="law-act">${esc(law.actName || law.lawCategory || '')}</div>
            ${(law.lawSections||[]).length ? `
            <div class="law-sections">
              ${law.lawSections.map(s => `<span class="law-sec-tag">${esc(s)}</span>`).join('')}
            </div>` : ''}
          </div>
        </div>`;
      }).join('')}
      ${laws.length > 5 ? `<div style="font-size:12px;color:var(--text-lt);margin-top:6px">+ ${laws.length-5} more applicable laws</div>` : ''}
    </div>` : '';

  // Probability scores
  const probHtml = probs.length ? `
    <div class="prob-section">
      <div class="laws-title">🎯 Case Probability</div>
      ${probs.map(p => {
        const score = Math.round(p.overallScore || 0);
        const comp  = p.components || {};
        return `
        <div class="prob-card">
          <div class="prob-circle ${probClass(score)}">
            <span>${score}%</span>
            <span class="prob-label">Win</span>
          </div>
          <div class="prob-details">
            <div class="prob-type">${esc(p.caseType || 'Overall')}</div>
            <div class="prob-bars">
              ${[
                ['Evidence',       comp.evidence],
                ['Legal Strength', comp.legalStrength],
                ['Procedural',     comp.procedural],
                ['Precedent',      comp.precedent]
              ].filter(x => x[1] != null).map(([label, val]) => `
              <div class="prob-bar-row">
                <span style="min-width:90px">${label}</span>
                <div class="prob-bar-track"><div class="prob-bar-fill" style="width:${Math.round(val||0)}%"></div></div>
                <span>${Math.round(val||0)}%</span>
              </div>`).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>` : '';

  // Documents section
  const docsHtml = `
    <div class="docs-section">
      <div class="laws-title">📁 Documents from Client (${docs.length})</div>
      ${docs.length === 0 ? `<div style="font-size:13px;color:var(--text-lt);font-style:italic;padding:10px 0">No documents uploaded yet.</div>` :
        docs.map(doc => `
        <div class="doc-item">
          <span class="doc-icon">${docIcon(doc.documentName)}</span>
          <div class="doc-info">
            <div class="doc-name">${esc(doc.documentName || 'Untitled')}</div>
            <div class="doc-meta">${esc(doc.caseType||'')} ${doc.uploadedAt ? '· Uploaded ' + timeAgo(doc.uploadedAt) : ''}</div>
          </div>
          <div class="doc-actions">
            ${doc.isUploaded && doc.uploadedFile
              ? `<a href="${esc(doc.uploadedFile)}" target="_blank" rel="noopener" class="btn btn-ghost btn-xs">⬇ Download</a>`
              : `<span class="doc-pending">Not yet uploaded</span>`
            }
          </div>
        </div>`).join('')
      }
    </div>`;

  // Contact details (only if accepted/completed)
  const canSeeContact = ['accepted','completed'].includes(l.status);
  const contactHtml = canSeeContact ? `
    <div class="info-row">
      <span class="info-label">📞 Phone</span>
      <span class="info-val"><a href="tel:${esc(l.userPhone)}">${esc(l.userPhone||'—')}</a></span>
    </div>
    <div class="info-row">
      <span class="info-label">✉️ Email</span>
      <span class="info-val"><a href="mailto:${esc(l.userEmail)}">${esc(l.userEmail||'—')}</a></span>
    </div>` :
    `<div class="contact-locked">🔒 Accept this lead to see client contact details</div>`;

  // Actions depending on status
  let actionsHtml = '';
  if (l.status === 'new' || l.status === 'viewed') {
    actionsHtml = `
      <div class="actions-row">
        <button class="btn btn-success" onclick="updateLead('${l.id}','accepted',this)">✓ Accept Lead</button>
        <button class="btn btn-danger" onclick="updateLead('${l.id}','rejected',this)">✕ Decline</button>
      </div>`;
  } else if (l.status === 'accepted') {
    actionsHtml = `
      <div class="actions-row">
        <button class="btn btn-success" onclick="updateLead('${l.id}','completed',this)">🏆 Mark Completed</button>
      </div>`;
  }

  const notesHtml = `
    <div>
      <label class="notes-label">📝 Internal Notes (not visible to client)</label>
      <textarea class="notes-area" id="notes-${l.id}" placeholder="Add notes about this case, next steps, fees quoted, etc.">${esc(l.lawyerNotes||'')}</textarea>
    </div>
    <div class="fee-input-row">
      <label style="font-size:12px;font-weight:700;color:var(--text-lt)">Quoted Fee:</label>
      <div class="fee-wrap">
        <span class="fee-prefix">₹</span>
        <input type="number" id="fee-${l.id}" min="0" placeholder="0" value="${l.quotedFee?.amount||''}">
      </div>
      <input type="text" id="feedesc-${l.id}" placeholder="Description (e.g. retainer fee)" value="${esc(l.quotedFee?.description||'')}" style="flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r);font-size:13px;font-family:var(--font);outline:none;min-width:160px">
    </div>
    <div class="save-btn-row">
      <button class="btn btn-ghost btn-sm" onclick="saveNotes('${l.id}')">💾 Save Notes & Fee</button>
    </div>`;

  return `
  <div class="lead-card status-${l.status}" id="card-${l.id}">
    <!-- Header (clickable to expand) -->
    <div class="lead-head" onclick="toggleCard('${l.id}')">
      <div class="urgency-dot ${urgClass[l.urgency]||'urg-medium'}" title="Urgency: ${l.urgency}"></div>
      <div class="lead-head-main">
        <div class="lead-case-tags">
          ${(l.caseTypes||[]).length
            ? l.caseTypes.map(t => `<span class="case-tag">${esc(t)}</span>`).join('')
            : '<span class="case-tag">General Query</span>'}
        </div>
        <div class="lead-desc-preview">${esc((l.description||'').slice(0,160))}</div>
        <div class="lead-meta-row">
          <span>👤 ${esc(l.userName || 'Anonymous')}</span>
          <span>🕐 ${timeAgo(l.createdAt)}</span>
          ${l.respondedAt ? `<span>Responded: ${timeAgo(l.respondedAt)}</span>` : ''}
        </div>
      </div>
      <div class="lead-head-right">
        <span class="badge ${badgeClass[l.status]||'badge-viewed'}">${l.status}</span>
        <span class="badge badge-${l.urgency||'medium'}">${l.urgency||'medium'} urgency</span>
        <span class="chevron" id="chev-${l.id}">▼</span>
      </div>
    </div>

    <!-- Body (expandable) -->
    <div class="lead-body" id="body-${l.id}">

      <!-- Case description + client info -->
      <div class="body-grid">
        <div>
          <div class="info-section">
            <div class="info-section-title">👤 Client Information</div>
            <div class="info-row">
              <span class="info-label">Name</span>
              <span class="info-val">${esc(l.userName || '—')}</span>
            </div>
            ${contactHtml}
            ${l.userMessage ? `
            <div class="info-row" style="margin-top:8px">
              <span class="info-label">Message from client</span>
              <span class="info-val" style="font-style:italic">"${esc(l.userMessage)}"</span>
            </div>` : ''}
          </div>
        </div>
        <div>
          <div class="info-section">
            <div class="info-section-title">📋 Lead Details</div>
            <div class="info-row"><span class="info-label">Lead ID</span><span class="info-val" style="font-size:11px;font-family:monospace">${esc(l.leadId)}</span></div>
            <div class="info-row"><span class="info-label">Received</span><span class="info-val">${fmtDate(l.createdAt)}</span></div>
            ${l.viewedAt ? `<div class="info-row"><span class="info-label">Viewed</span><span class="info-val">${fmtDate(l.viewedAt)}</span></div>` : ''}
            ${l.respondedAt ? `<div class="info-row"><span class="info-label">Responded</span><span class="info-val">${fmtDate(l.respondedAt)}</span></div>` : ''}
            ${l.quotedFee?.amount ? `<div class="info-row"><span class="info-label">Quoted Fee</span><span class="info-val" style="font-weight:700;color:var(--gr-700)">₹${l.quotedFee.amount.toLocaleString('en-IN')}${l.quotedFee.description ? ' – ' + esc(l.quotedFee.description) : ''}</span></div>` : ''}
          </div>
        </div>
      </div>

      <!-- Full case description -->
      ${(inq.description || l.description) ? `
      <div class="laws-title" style="margin-bottom:8px">📄 Full Case Description</div>
      <div class="case-desc-full">${esc(inq.description || l.description)}</div>` : ''}

      <!-- Applicable laws -->
      ${lawsHtml}

      <!-- Probability scores -->
      ${probHtml}

      <!-- Documents -->
      ${docsHtml}

      <!-- Actions panel -->
      <div class="actions-panel">
        <div class="actions-panel-title">Actions</div>
        ${actionsHtml}
        ${notesHtml}
      </div>

    </div><!-- /lead-body -->
  </div>`;
}

// ── Toggle card expand ────────────────────────────────────────────────────────
function toggleCard(id) {
  const body = $('body-' + id);
  const chev = $('chev-' + id);
  const isOpen = body.classList.contains('open');

  // Auto-mark as viewed when first opened
  if (!isOpen) {
    const lead = allLeads.find(l => l.id === id);
    if (lead && lead.status === 'new') {
      updateLeadSilent(id, 'viewed');
      lead.status = 'viewed';
      const card = $('card-' + id);
      if (card) { card.className = 'lead-card status-viewed'; }
      const badge = card?.querySelector('.badge:first-child');
      if (badge) { badge.className = 'badge badge-viewed'; badge.textContent = 'viewed'; }
    }
  }

  body.classList.toggle('open', !isOpen);
  chev.style.transform = isOpen ? '' : 'rotate(180deg)';
}

// ── Update lead status ────────────────────────────────────────────────────────
async function updateLead(id, status, btn) {
  if (btn) btn.disabled = true;
  try {
    const res  = await fetch('/api/lawyer/leads', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.token },
      body: JSON.stringify({ leadId: id, status })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    showToast(status === 'accepted' ? '✅ Lead accepted! Client details are now visible.' :
              status === 'rejected' ? 'Lead declined.' :
              status === 'completed' ? '🏆 Marked as completed!' : 'Updated.');

    // Refresh the card
    const lead = allLeads.find(l => l.id === id);
    if (lead) {
      lead.status = status;
      if (['accepted','completed'].includes(status)) {
        lead.userEmail = data.lead.userEmail || lead.userEmail;
        lead.userPhone = data.lead.userPhone || lead.userPhone;
      }
    }
    // Re-render this card
    const card = $('card-' + id);
    if (card && lead) {
      card.outerHTML = buildLeadCard(lead);
      $('body-' + id).classList.add('open');
      $('chev-' + id).style.transform = 'rotate(180deg)';
    }

    // Update stats counts
    loadStats();
  } catch (e) {
    showToast('Error: ' + e.message, false);
    if (btn) btn.disabled = false;
  }
}

// Silent update (no UI refresh needed for viewed)
async function updateLeadSilent(id, status) {
  try {
    await fetch('/api/lawyer/leads', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.token },
      body: JSON.stringify({ leadId: id, status })
    });
  } catch {}
}

async function saveNotes(id) {
  const notes   = $('notes-' + id)?.value || '';
  const feeAmt  = parseFloat($('fee-' + id)?.value || 0) || 0;
  const feedesc = $('feedesc-' + id)?.value || '';
  try {
    const res  = await fetch('/api/lawyer/leads', {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', Authorization: 'Bearer ' + session.token },
      body: JSON.stringify({
        leadId: id,
        lawyerNotes: notes,
        ...(feeAmt > 0 ? { quotedFee: { amount: feeAmt, description: feedesc } } : {})
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    showToast('💾 Notes saved.');
    // Update local lead
    const lead = allLeads.find(l => l.id === id);
    if (lead) { lead.lawyerNotes = notes; if (feeAmt) lead.quotedFee = { amount: feeAmt, description: feedesc, currency:'INR' }; }
  } catch (e) {
    showToast('Could not save: ' + e.message, false);
  }
}

async function loadStats() {
  try {
    const res  = await fetch('/api/lawyer/leads?limit=1', { headers: { Authorization: 'Bearer ' + session.token } });
    const data = await res.json();
    if (data.success) renderStats(data.stats);
  } catch {}
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentStatus = tab.dataset.status || '';
  // Update URL without reload
  const url = new URL(location.href);
  if (currentStatus) url.searchParams.set('status', currentStatus);
  else url.searchParams.delete('status');
  history.replaceState(null, '', url);
  loadLeads(currentStatus);
}

// ── Init ─────────────────────────────────────────────────────────────────────
// Set active tab from URL
if (currentStatus) {
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.status === currentStatus);
  });
}

loadLeads(currentStatus);
</script>
</body>
</html>
