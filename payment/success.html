<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Payment Successful – SatLegal</title>
<style>
:root{--sf-500:#FF9933;--sf-600:#E07000;--sf-100:#FFF4E6;--gr-500:#138808;--gr-600:#1A6B1A;--gr-700:#145214;--gr-800:#0D3D0D;--gr-50:#F0FBF0;--gr-100:#D4F5D2;--text:#1A1A1A;--text-lt:#6B7280;--border:#E5E7EB;--bg:#F8F9FA;--font:'Segoe UI',system-ui,sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{
  text-align: justify;font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
.tribar{height:5px;background:linear-gradient(90deg,var(--sf-500) 33.33%,#fff 33.33%,#fff 66.66%,var(--gr-500) 66.66%)}
.nav{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-brand img{height:36px}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
/* Card */
.success-card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.09);padding:40px 32px;max-width:560px;width:100%;text-align:center}
.check-circle{width:80px;height:80px;border-radius:50%;background:var(--gr-50);border:3px solid var(--gr-500);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 20px}
.success-card h1{font-size:24px;font-weight:900;color:var(--gr-800);margin-bottom:8px}
.success-card .sub{font-size:14px;color:var(--text-lt);margin-bottom:28px;line-height:1.7}
/* Order details */
.order-box{background:var(--gr-50);border:1px solid var(--gr-100);border-radius:12px;padding:20px;margin-bottom:24px;text-align:left}
.order-box h3{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--gr-800);margin-bottom:12px}
.order-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--gr-100);font-size:13px}
.order-row:last-child{border:none;font-weight:700;font-size:14px;padding-top:10px}
.order-row .label{color:var(--text-lt)}
.order-row .value{color:var(--gr-800);font-weight:600}
/* Action buttons */
.actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.btn-green{background:var(--gr-800);color:#fff;border:none;padding:13px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s;text-decoration:none;display:inline-block}
.btn-green:hover{background:var(--gr-700)}
.btn-sf{background:var(--sf-500);color:#fff;border:none;padding:13px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s;text-decoration:none;display:inline-block}
.btn-sf:hover{background:var(--sf-600)}
.btn-outline{background:transparent;color:var(--gr-700);border:2px solid var(--gr-500);padding:13px 22px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.2s;text-decoration:none;display:inline-block}
.btn-outline:hover{background:var(--gr-50)}
/* Invoice link */
.invoice-link{font-size:12px;color:var(--text-lt);margin-top:8px}
.invoice-link a{color:var(--sf-600);font-weight:600}
.invoice-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="tribar"></div>
<nav class="nav">
  <a class="nav-brand" href="../index.html"><img src="../assets/logo.png" alt="SatLegal"/></a>
  <a href="../dashboard/user-dashboard.html" style="font-size:13px;color:var(--gr-700);font-weight:600">📋 My Dashboard</a>
</nav>

<main>
  <div class="success-card">
    <div class="check-circle">✅</div>
    <h1 id="successTitle">Payment Successful!</h1>
    <p class="sub" id="successSub">Your payment has been processed. You can now access your legal report.</p>

    <div class="order-box">
      <h3>Order Summary</h3>
      <div class="order-row"><span class="label">Order ID</span><span class="value" id="orderId">—</span></div>
      <div class="order-row"><span class="label">Plan</span><span class="value" id="planName">—</span></div>
      <div class="order-row"><span class="label">Date</span><span class="value" id="payDate">—</span></div>
      <div class="order-row"><span class="label">Payment Method</span><span class="value">Razorpay</span></div>
      <div class="order-row"><span class="label">Amount Paid</span><span class="value" id="amtPaid" style="color:var(--gr-500)">—</span></div>
    </div>

    <div class="actions" id="actionBtns"><!-- populated by JS --></div>

    <div class="invoice-link">
      Need a GST invoice? <a href="invoice.html" id="invoiceLink">Download Invoice →</a>
    </div>
  </div>
</main>

<script>
let payment={},user={};
try{payment=JSON.parse(localStorage.getItem('sl_payment')||'{}')}catch(e){}
try{user=JSON.parse(localStorage.getItem('sl_user')||'{}')}catch(e){}

const plan=payment.plan||new URLSearchParams(location.search).get('plan')||'report';
const amt=payment.amt||new URLSearchParams(location.search).get('amt')||499;
const payId=payment.paymentId||'—';

document.getElementById('orderId').textContent=payId;
document.getElementById('planName').textContent=plan==='consult'?'Expert Consultation (₹2,499)':'Digital Legal Report (₹499)';
document.getElementById('payDate').textContent=payment.paidAt?new Date(payment.paidAt).toLocaleString('en-IN',{dateStyle:'long',timeStyle:'short'}):new Date().toLocaleString('en-IN',{dateStyle:'long',timeStyle:'short'});
document.getElementById('amtPaid').textContent='₹'+amt+' (incl. GST)';
document.getElementById('invoiceLink').href='invoice.html?id='+payId;

if(plan==='consult'){
  document.getElementById('successTitle').textContent='Payment Received!';
  document.getElementById('successSub').textContent='Your ₹2,499 expert consultation has been confirmed. Please book your time slot now.';
  document.getElementById('actionBtns').innerHTML=`
    <a class="btn-sf" href="../consultation/book.html">📅 Book Consultation Slot</a>
    <a class="btn-outline" href="../report.html">📄 View Report</a>
    <a class="btn-outline" href="../dashboard/user-dashboard.html">📋 Dashboard</a>
  `;
} else {
  document.getElementById('actionBtns').innerHTML=`
    <a class="btn-green" href="../report.html">📄 View My Report</a>
    <a class="btn-sf" href="../consultation/book.html">🧑‍⚖️ Book ₹2,499 Consultation</a>
    <a class="btn-outline" href="../index.html">🔍 Analyze Another Case</a>
  `;
}
</script>
</body>
</html>
