<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SatLegal — Pre-Deployment Tester</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --card: #21253a;
    --border: #2e3352; --accent: #4f8ef7; --green: #22c55e;
    --red: #ef4444; --yellow: #f59e0b; --gray: #64748b;
    --text: #e2e8f0; --muted: #94a3b8;
    --font: 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }

  /* Layout */
  .app { display: grid; grid-template-rows: auto 1fr; height: 100vh; overflow: hidden; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
  header h1 span { color: var(--accent); }
  .badge { font-size: 10px; background: var(--accent)22; color: var(--accent);
    border: 1px solid var(--accent)44; border-radius: 4px; padding: 2px 7px; font-weight: 600; }
  .spacer { flex: 1; }

  /* Config bar */
  .config { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .config input[type=text] {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 7px 12px; font-size: 13px; width: 300px; outline: none;
  }
  .config input[type=text]:focus { border-color: var(--accent); }
  select {
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 6px; padding: 7px 10px; font-size: 13px; outline: none; cursor: pointer;
  }
  button {
    border: none; border-radius: 6px; padding: 7px 16px; font-size: 13px;
    cursor: pointer; font-weight: 600; transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-run { background: var(--accent); color: #fff; }
  .btn-stop { background: var(--red); color: #fff; }
  .btn-clear { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
  .btn-export { background: var(--card); color: var(--muted); border: 1px solid var(--border); }

  /* Main columns */
  .main { display: grid; grid-template-columns: 280px 1fr; overflow: hidden; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border);
    overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 12px; }
  .content { overflow-y: auto; padding: 20px 24px; }

  /* Score summary */
  .score-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
  .score-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px 12px; text-align: center; }
  .score-box .num { font-size: 28px; font-weight: 800; line-height: 1; }
  .score-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .num.pass { color: var(--green); }
  .num.fail { color: var(--red); }
  .num.skip { color: var(--yellow); }
  .num.total { color: var(--accent); }

  /* Progress bar */
  .progress-wrap { background: var(--card); border-radius: 8px; overflow: hidden; height: 6px; margin: 14px 0 6px; }
  .progress-bar { height: 100%; background: var(--accent); transition: width 0.1s linear; width: 0; }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

  /* Category sidebar */
  .cat-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.8px; padding: 0 4px 6px; border-bottom: 1px solid var(--border); }
  .cat-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; transition: background 0.1s; font-size: 13px; }
  .cat-item:hover, .cat-item.active { background: var(--card); }
  .cat-item .cat-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cat-pill { font-size: 10px; font-weight: 700; min-width: 20px; text-align: center;
    border-radius: 10px; padding: 1px 5px; }
  .pill-pass { background: var(--green)22; color: var(--green); }
  .pill-fail { background: var(--red)22; color: var(--red); }
  .pill-skip { background: var(--gray)22; color: var(--gray); }

  /* Results table */
  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 10px; }
  .filter-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; background: var(--card); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 12px; border-radius: 20px; cursor: pointer; }
  .filter-btn.active { background: var(--accent)22; border-color: var(--accent); color: var(--accent); }

  .result-list { display: flex; flex-direction: column; gap: 6px; }
  .result-row { background: var(--card); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px; cursor: pointer; transition: border-color 0.1s; }
  .result-row:hover { border-color: var(--accent)66; }
  .result-row.pass { border-left: 3px solid var(--green); }
  .result-row.fail { border-left: 3px solid var(--red); }
  .result-row.running { border-left: 3px solid var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .result-row.pending { border-left: 3px solid var(--border); opacity: 0.5; }

  .result-header { display: flex; align-items: center; gap: 10px; }
  .result-status { font-size: 11px; font-weight: 700; min-width: 45px; }
  .status-pass { color: var(--green); }
  .status-fail { color: var(--red); }
  .status-run  { color: var(--yellow); }
  .status-pend { color: var(--gray); }
  .result-query { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result-tags { display: flex; gap: 4px; }
  .tag { font-size: 10px; background: var(--border); color: var(--muted);
    border-radius: 4px; padding: 1px 5px; white-space: nowrap; }

  .result-detail { display: none; margin-top: 10px; padding-top: 10px;
    border-top: 1px solid var(--border); font-size: 12px; }
  .result-row.expanded .result-detail { display: block; }
  .detail-grid { display: grid; grid-template-columns: auto 1fr; gap: 4px 12px; }
  .detail-label { color: var(--muted); font-weight: 600; white-space: nowrap; }
  .detail-val { color: var(--text); }
  .detail-laws { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
  .law-item { display: flex; align-items: center; gap: 8px; background: var(--surface);
    border-radius: 5px; padding: 4px 8px; }
  .law-rank { color: var(--muted); font-size: 10px; min-width: 20px; }
  .law-name { flex: 1; }
  .law-score { color: var(--accent); font-weight: 700; font-size: 11px; }
  .law-match { color: var(--green); font-size: 10px; font-weight: 700; }

  /* Manual tester */
  .manual-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px; margin-bottom: 20px; }
  .manual-section h2 { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input { flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 9px 14px; font-size: 14px; outline: none; }
  .manual-row input:focus { border-color: var(--accent); }
  .manual-result { margin-top: 12px; font-size: 13px; }

  /* Questions display */
  .q-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .q-item { background: var(--card); border-radius: 6px; padding: 8px 12px;
    font-size: 12px; border-left: 3px solid var(--accent)66; }
  .q-item .q-text { font-weight: 600; }
  .q-item .q-opts { color: var(--muted); margin-top: 3px; }

  /* Detected areas */
  .area-chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
  .area-chip { font-size: 11px; background: var(--accent)22; color: var(--accent);
    border: 1px solid var(--accent)44; border-radius: 20px; padding: 2px 10px; font-weight: 600; }

  /* Speed readout */
  .speed-bar { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-top: 4px; }
  .speed-bar span { color: var(--text); font-weight: 600; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Empty state */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* Error badge */
  .err-msg { color: var(--red); font-size: 11px; margin-top: 4px; }
</style>
<!-- Extended benchmark — load before inline script -->
<script src="benchmark-2000.js"></script>
</head>
<body>
<div class="app">

<!-- HEADER -->
<header>
  <h1>⚡ <span>SatLegal</span> Pre-Deploy Tester</h1>
  <span class="badge">v2.0</span>
  <div class="config">
    <input type="text" id="apiUrl" value="https://satlegal-40.vercel.app" placeholder="https://your-site.vercel.app">
    <select id="testMode">
      <option value="keyword">Keyword engine only (offline)</option>
      <option value="api" selected>Live API (Vercel)</option>
      <option value="both">Both layers</option>
    </select>
    <select id="catFilter">
      <option value="">All categories</option>
    </select>
    <button class="btn-run" id="btnRun" onclick="startRun()">▶ Run Tests</button>
    <button class="btn-stop" id="btnStop" onclick="stopRun()" style="display:none">■ Stop</button>
    <button class="btn-clear" onclick="clearResults()">Clear</button>
    <button class="btn-export" onclick="exportCSV()">↓ CSV</button>
  </div>
  <div class="spacer"></div>
  <div style="font-size:12px;color:var(--muted)">
    <span id="testCountLabel">258 tests loaded</span>
  </div>
</header>

<!-- MAIN -->
<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="cat-title">Categories</div>
    <div id="catList"></div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- Manual query tester -->
    <div class="manual-section">
      <h2>🔍 Manual Query Tester</h2>
      <div class="manual-row">
        <input type="text" id="manualInput" placeholder="Type any legal query…" onkeydown="if(event.key==='Enter')testManual()">
        <button class="btn-run" onclick="testManual()">Test</button>
      </div>
      <div class="manual-result" id="manualResult"></div>
    </div>

    <!-- Score summary -->
    <div class="score-row" style="margin-bottom:12px">
      <div class="score-box"><div class="num total" id="sTotal">0</div><div class="lbl">Total</div></div>
      <div class="score-box"><div class="num pass" id="sPass">0</div><div class="lbl">Pass</div></div>
      <div class="score-box"><div class="num fail" id="sFail">0</div><div class="lbl">Fail</div></div>
      <div class="score-box"><div class="num" id="sAcc" style="color:var(--accent)">—</div><div class="lbl">Accuracy</div></div>
    </div>

    <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label" id="progressLabel"></div>
    <div class="speed-bar" id="speedBar"></div>

    <!-- Filter -->
    <div class="filter-row" id="filterRow" style="margin-top:14px">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pass',this)">✓ Pass</button>
      <button class="filter-btn" onclick="setFilter('fail',this)">✗ Fail</button>
    </div>

    <!-- Results -->
    <div class="section-title" id="resultsTitle">RESULTS</div>
    <div class="result-list" id="resultList">
      <div class="empty">
        <div class="icon">🧪</div>
        <p>Click <strong>Run Tests</strong> to start the benchmark.<br>Results appear in real-time.</p>
      </div>
    </div>

  </div>
</div>
</div>

const THRESHOLD = 8;
const DOMINATES = {
  criminal:   ['consumer', 'succession', 'civil'],

function detectAreas(query) {
  const input = query.toLowerCase();
  const scores = {};
  for (const [area, tiers] of Object.entries(DETECTORS)) {
    let score = 0;
    if ((tiers.t1 || []).some(k => input.includes(k))) {
      score = 100;
    } else {
      (tiers.t2 || []).forEach(k => { if (input.includes(k)) score += 10; });
      (tiers.t3 || []).forEach(k => { if (input.includes(k)) score += 1; });
    }
    scores[area] = score;
  }
  const dominated = new Set();
  let detected = Object.entries(scores)
    .filter(([, s]) => s >= THRESHOLD)
    .sort((a, b) => b[1] - a[1])
    .map(([area]) => area);
  detected.forEach(area => (DOMINATES[area] || []).forEach(s => dominated.add(s)));
  return { areas: detected.filter(a => !dominated.has(a)), scores };
}

async function startRun() {
  if (running) return;
  running = true; stopFlag = false; runStart = Date.now();
  results = [];

  const catFilter = document.getElementById('catFilter').value;
  const mode = document.getElementById('testMode').value;
  const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');

  let tests = catFilter ? TESTS.filter(t => (t.tags||[]).includes(catFilter)) : [...TESTS];

  document.getElementById('btnRun').style.display = 'none';
  document.getElementById('btnStop').style.display = '';
  document.getElementById('resultList').innerHTML = '';

  for (let i = 0; i < tests.length; i++) {
    if (stopFlag) break;
    const t = tests[i];

    // Add pending row
    const row = addResultRow(t, 'pending', null, null);

    let apiResult = null;
    let kwResult = null;
    let passed = false;

    if (mode === 'keyword' || mode === 'both') {
      kwResult = detectAreas(t.q);
    }

    if (mode === 'api' || mode === 'both') {
      row.classList.add('running');
      row.querySelector('.result-status').textContent = '...';
      try {
        const resp = await fetch(`${apiUrl}/api/analyse`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description: t.q.replace(/^N:/,'') }),
          signal: AbortSignal.timeout(12000),
        });
        apiResult = await resp.json();
      } catch (e) {
        apiResult = { error: e.message };
      }
      row.classList.remove('running');
    }

    // Evaluate pass/fail
    passed = evaluate(t, apiResult, kwResult, mode);

    const res = { test: t, apiResult, kwResult, passed, mode };
    results.push(res);
    updateRowWithResult(row, res);
    updateStats(i + 1, tests.length);
  }

  running = false;
  document.getElementById('btnRun').style.display = '';
  document.getElementById('btnStop').style.display = 'none';
  updateCatSidebar();
  renderResults(); // update RESULTS (n) count after run completes
}

function stopRun() {
  stopFlag = true;
  document.getElementById('btnStop').disabled = true;
}

function evaluate(test, apiResult, kwResult, mode) {
  const isNeg = test.q.startsWith('N:');
  const expects = Array.isArray(test.expect) ? test.expect : [test.expect];

  if (mode === 'keyword' || mode === 'both') {
    // Keyword: check detected areas contain expected
    // (simplified — just area names, not full law names)
    // Skip keyword evaluation for negative tests in keyword mode
  }

  if (apiResult && !apiResult.error) {
    const laws = (apiResult.laws || []).map(l => (l.caseType || l.law || '').toLowerCase());
    if (isNeg) {
      return !expects.some(e => laws.some(l => l.includes(e.toLowerCase())));
    } else {
      return expects.some(e => laws.some(l => l.includes(e.toLowerCase())));
    }
  }

  // Keyword-only fallback
  if (kwResult) {
    const areas = kwResult.areas;
    if (isNeg) {
      return !expects.some(e => areas.some(a => a.toLowerCase().includes(e.toLowerCase()) || e.toLowerCase().includes(a.toLowerCase())));
    }
    return expects.some(e => areas.some(a => a.toLowerCase().includes(e.toLowerCase()) || e.toLowerCase().includes(a.toLowerCase())));
  }

  return false;
}

// ═══════════════════════════════════════════════════════════
// DOM RENDERING
// ═══════════════════════════════════════════════════════════
function addResultRow(test, status, apiResult, kwResult) {
  const list = document.getElementById('resultList');
  if (list.querySelector('.empty')) list.innerHTML = '';

  const div = document.createElement('div');
  div.className = `result-row ${status}`;
  div.dataset.id = test.id;
  const isNeg = test.q.startsWith('N:');
  const tags = (test.tags || []).slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('');

  div.innerHTML = `
    <div class="result-header" onclick="toggleRow(this.parentElement)">
      <span class="result-status status-pend">WAIT</span>
      <span class="result-query" title="${esc(test.q)}">${isNeg ? '<span style="color:var(--yellow)" title="Negative test — law must NOT appear">∅</span> ' : ''}${esc(test.q.replace(/^N:/,''))}</span>
      <div class="result-tags">${tags}</div>
    </div>
    <div class="result-detail"></div>
  `;
  list.appendChild(div);
  return div;
}

function updateRowWithResult(row, res) {
  const { test, passed, apiResult, kwResult } = res;
  const isNeg = test.q.startsWith('N:');
  row.classList.remove('pending','running','pass','fail');
  row.classList.add(passed ? 'pass' : 'fail');

  const statusEl = row.querySelector('.result-status');
  statusEl.textContent = passed ? 'PASS' : 'FAIL';
  statusEl.className = `result-status ${passed ? 'status-pass' : 'status-fail'}`;

  // Fill detail
  const detail = row.querySelector('.result-detail');
  const expects = Array.isArray(test.expect) ? test.expect.join(' | ') : (test.expect || 'any');
  let html = `<div class="detail-grid">
    <span class="detail-label">Query</span><span class="detail-val">${esc(test.q.replace(/^N:/,''))}${isNeg ? ' <em style="color:var(--yellow)">(must NOT match)</em>' : ''}</span>
    <span class="detail-label">Expect</span><span class="detail-val">${esc(expects)}</span>
  </div>`;

  if (apiResult && !apiResult.error) {
    const laws = apiResult.laws || [];
    html += `<div style="margin-top:8px;font-size:11px;color:var(--muted);font-weight:600">API TOP LAWS</div>
    <div class="detail-laws">${laws.slice(0,5).map((l, i) => {
      const name = l.caseType || l.law || '?';
      const score = l.score || l.confidence || '';
      const expectArr = Array.isArray(test.expect) ? test.expect : [test.expect||''];
      const isMatch = expectArr.some(e => name.toLowerCase().includes(e.toLowerCase()));
      return `<div class="law-item">
        <span class="law-rank">#${i+1}</span>
        <span class="law-name">${esc(name)}</span>
        ${score ? `<span class="law-score">${typeof score === 'number' ? score.toFixed(0) : score}</span>` : ''}
        ${isMatch && !isNeg ? '<span class="law-match">✓ MATCH</span>' : ''}
      </div>`;
    }).join('')}</div>`;
  } else if (apiResult && apiResult.error) {
    html += `<div class="err-msg">API Error: ${esc(apiResult.error)}</div>`;
  }

  if (kwResult) {
    html += `<div style="margin-top:8px;font-size:11px;color:var(--muted);font-weight:600">KEYWORD AREAS DETECTED</div>
    <div class="area-chips">${kwResult.areas.length ? kwResult.areas.map(a => `<span class="area-chip">${a}</span>`).join('') : '<span style="color:var(--muted)">none</span>'}</div>`;
  }

  detail.innerHTML = html;
}

function toggleRow(el) {
  el.classList.toggle('expanded');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ═══════════════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════════════
function updateStats(done, total) {
  const pass = results.filter(r => r.passed).length;
  const fail = results.filter(r => !r.passed).length;
  const acc = done > 0 ? ((pass / done) * 100).toFixed(1) : '—';
  const elapsed = ((Date.now() - runStart) / 1000).toFixed(1);
  const rate = done > 0 ? (done / ((Date.now() - runStart) / 1000)).toFixed(1) : 0;

  document.getElementById('sTotal').textContent = done;
  document.getElementById('sPass').textContent = pass;
  document.getElementById('sFail').textContent = fail;
  document.getElementById('sAcc').textContent = done > 0 ? acc + '%' : '—';
  document.getElementById('progressBar').style.width = `${(done / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${done} / ${total} tested`;
  document.getElementById('speedBar').innerHTML = `<span>${elapsed}s</span> elapsed &nbsp; <span>${rate}</span> tests/sec &nbsp; ETA: <span>${rate > 0 ? ((total - done) / rate).toFixed(0) : '?'}s</span>`;
}

function updateCatSidebar() {
  allCategories().forEach(cat => {
    const catTests = results.filter(r => (r.test.tags||[]).includes(cat));
    const pass = catTests.filter(r => r.passed).length;
    const fail = catTests.filter(r => !r.passed).length;
    const pill = document.getElementById(`pill-${cat}`);
    if (pill) {
      pill.textContent = `${pass}/${catTests.length}`;
      pill.className = `cat-pill ${fail === 0 && catTests.length > 0 ? 'pill-pass' : fail > 0 ? 'pill-fail' : 'pill-skip'}`;
    }
  });
  const allPass = results.filter(r => r.passed).length;
  const allPill = document.getElementById('pill-all');
  if (allPill) allPill.textContent = `${allPass}/${results.length}`;
}

// ═══════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults();
}

function renderResults() {
  let filtered = results;
  if (activeFilter === 'pass') filtered = filtered.filter(r => r.passed);
  if (activeFilter === 'fail') filtered = filtered.filter(r => !r.passed);
  if (activeCat) filtered = filtered.filter(r => (r.test.tags||[]).includes(activeCat));

  document.getElementById('resultsTitle').textContent = `RESULTS (${filtered.length})`;
  // Re-render is complex; just highlight
}

function clearResults() {
  results = [];
  document.getElementById('resultList').innerHTML = `
    <div class="empty"><div class="icon">🧪</div><p>Click <strong>Run Tests</strong> to start the benchmark.<br>Results appear in real-time.</p></div>`;
  document.getElementById('sTotal').textContent = '0';
  document.getElementById('sPass').textContent = '0';
  document.getElementById('sFail').textContent = '0';
  document.getElementById('sAcc').textContent = '—';
  document.getElementById('progressBar').style.width = '0';
  document.getElementById('progressLabel').textContent = '';
  document.getElementById('speedBar').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════
function exportCSV() {
  if (!results.length) return alert('No results to export.');
  const rows = [['Query','Expected','Passed','Top Law 1','Top Law 2','Top Law 3','KW Areas','Tags']];
  results.forEach(r => {
    const laws = (r.apiResult && r.apiResult.laws) ? r.apiResult.laws.slice(0,3).map(l => l.caseType||l.law||'') : [];
    rows.push([
      r.test.q, Array.isArray(r.test.expect)?r.test.expect.join('|'):r.test.expect||'',
      r.passed?'PASS':'FAIL',
      laws[0]||'', laws[1]||'', laws[2]||'',
      r.kwResult ? r.kwResult.areas.join('|') : '',
      (r.test.tags||[]).join('|'),
    ]);
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `satlegal-test-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ═══════════════════════════════════════════════════════════
// MANUAL TESTER
// ═══════════════════════════════════════════════════════════
async function testManual() {
  const query = document.getElementById('manualInput').value.trim();
  if (!query) return;
  const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
  const mode = document.getElementById('testMode').value;
  const out = document.getElementById('manualResult');
  out.innerHTML = `<span style="color:var(--yellow)">Testing…</span>`;

  let html = '';

  // Keyword layer
  const kw = detectAreas(query);
  html += `<div style="margin-bottom:10px">
    <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Keyword Engine</div>
    <div class="area-chips">${kw.areas.length ? kw.areas.map(a=>`<span class="area-chip">${a}</span>`).join('') : '<span style="color:var(--muted)">No area detected</span>'}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:4px">Scores: ${Object.entries(kw.scores).filter(([,s])=>s>0).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`${k}:${v}`).join(' · ')}</div>
  </div>`;

  if (mode === 'api' || mode === 'both') {
    try {
      const resp = await fetch(`${apiUrl}/api/analyse`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: query }),
        signal: AbortSignal.timeout(15000),
      });
      const data = await resp.json();
      const laws = data.laws || [];
      html += `<div>
        <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Live API Results</div>
        <div class="detail-laws">${laws.slice(0,6).map((l,i) => {
          const name = l.caseType || l.law || '?';
          const score = l.score || l.confidence;
          return `<div class="law-item">
            <span class="law-rank">#${i+1}</span>
            <span class="law-name">${esc(name)}</span>
            ${score != null ? `<span class="law-score">${typeof score === 'number' ? score.toFixed(0) : score}</span>` : ''}
          </div>`;
        }).join('')}</div>`;

      // Show contextual questions if present
      if (data.contextualQuestions && data.contextualQuestions.length) {
        html += `<div style="margin-top:10px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Questions Shown to User</div>
          <div class="q-list">${data.contextualQuestions.map(q =>
            `<div class="q-item"><div class="q-text">${esc(q.question||q)}</div>${q.options ? `<div class="q-opts">${(q.options||[]).join(' · ')}</div>` : ''}</div>`
          ).join('')}</div>`;
      }
      html += `</div>`;

      if (data.error) html += `<div class="err-msg">Error: ${esc(data.error)}</div>`;

    } catch(e) {
      html += `<div class="err-msg">API call failed: ${esc(e.message)}</div>`;
    }
  }

  out.innerHTML = html;
}

init();
</script>
