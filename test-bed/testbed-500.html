<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SatLegal – 1000 Test Case Test Bed</title>
<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px}
.header{background:linear-gradient(135deg,var(--gr-dk),var(--gr));color:#fff;padding:20px 24px}
.header h1{font-size:20px;font-weight:900;margin-bottom:4px}
.header p{font-size:12px;opacity:.75}
.controls{background:#fff;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;position:sticky;top:0;z-index:100}
.btn{padding:7px 16px;border-radius:7px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);transition:.15s}
.btn-run{background:var(--sf);color:#fff}.btn-run:hover{background:#E08800}
.btn-reset{background:#fff;color:var(--text);border:1.5px solid var(--border)}.btn-reset:hover{background:var(--bg)}
.filter-btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border);background:#fff;color:var(--text-lt);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.filter-btn.active{border-color:var(--sf);background:var(--sf);color:#fff}
.filter-input{padding:6px 12px;border-radius:7px;border:1.5px solid var(--border);font-size:12px;font-family:var(--font);width:220px;outline:none}
.filter-input:focus{border-color:var(--sf)}
.stats-bar{display:flex;flex-wrap:wrap;gap:8px;margin:0 20px 0;padding:12px 0;border-bottom:1px solid var(--border)}
.stat-chip{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600}
.stat-chip .num{font-size:22px;font-weight:900;line-height:1}
.stat-chip.pass{border-color:var(--pass-bd);background:var(--pass-lt);color:var(--pass)}
.stat-chip.fail{border-color:var(--fail-bd);background:var(--fail-lt);color:var(--fail)}
.stat-chip.warn{border-color:var(--warn-bd);background:var(--warn-lt);color:var(--warn)}
.progress-wrap{padding:12px 20px;background:#fff;border-bottom:1px solid var(--border)}
.progress-bar-outer{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.progress-bar-inner{height:100%;background:var(--gr);border-radius:4px;transition:width .3s;width:0}
.progress-label{font-size:11px;color:var(--text-lt);margin-top:4px}
.category-section{margin:20px 20px 0}
.cat-header{background:linear-gradient(135deg,var(--gr-dk),#1A5E1A);color:#fff;padding:10px 16px;border-radius:10px 10px 0 0;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:space-between}
.cat-header .cat-stats{font-size:11px;opacity:.75;font-weight:600}
.test-table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 10px 10px;overflow:hidden;border:1px solid var(--border);border-top:none;margin-bottom:16px}
.test-table th{background:var(--bg);padding:8px 12px;text-align:left;font-size:11px;font-weight:700;color:var(--text-lt);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.test-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
.test-table tr:last-child td{border-bottom:none}
.test-table tr.pass td:first-child{border-left:3px solid var(--pass)}
.test-table tr.fail td:first-child{border-left:3px solid var(--fail)}
.test-table tr.warn td:first-child{border-left:3px solid var(--warn)}
.test-table tr.pending td:first-child{border-left:3px solid #ccc}
.status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}
.dot-pass{background:var(--pass)}.dot-fail{background:var(--fail)}.dot-warn{background:var(--warn)}.dot-pending{background:#ccc}
.badge-pass{background:var(--pass-lt);color:var(--pass);border:1px solid var(--pass-bd);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.badge-fail{background:var(--fail-lt);color:var(--fail);border:1px solid var(--fail-bd);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.badge-warn{background:var(--warn-lt);color:var(--warn);border:1px solid var(--warn-bd);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.badge-pending{background:#f5f5f5;color:#999;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px}
.query-text{color:var(--text);line-height:1.4;font-size:12px}
.expected-text{color:var(--gr);font-size:11px;font-weight:600}
.got-text{color:var(--text-lt);font-size:11px}
.got-fail{color:var(--fail);font-size:11px;font-weight:600}
.conf-score{font-size:11px;font-weight:700;color:var(--text-lt)}
.hidden{display:none!important}
.summary-box{background:linear-gradient(135deg,#fff,var(--bg));border:1px solid var(--border);border-radius:12px;padding:20px;margin:20px 20px 0;text-align:center}
.summary-box h2{font-size:18px;font-weight:900;color:var(--gr-dk);margin-bottom:4px}
.pct-ring{font-size:36px;font-weight:900;margin:10px 0}
.pct-ring.good{color:var(--pass)}.pct-ring.ok{color:var(--warn)}.pct-ring.bad{color:var(--fail)}

</head>

<div class="header">

let currentFilter = 'all';
let results = {};

function getCategories(){
  const cats = [];
  const seen = new Set();
  TESTS.forEach(t => { if(!seen.has(t.cat)){ cats.push(t.cat); seen.add(t.cat); }});
  return cats;
}

function buildUI(){
  const cats = getCategories();
  const container = document.getElementById('testContainer');
  container.innerHTML = '';

  // Group tests by category
  const bycat = {};
  TESTS.forEach(t => { if(!bycat[t.cat]) bycat[t.cat] = []; bycat[t.cat].push(t); });

  cats.forEach(cat => {
    const tests = bycat[cat];
    const sec = document.createElement('div');
    sec.className = 'category-section';
    sec.id = 'cat_' + cat.replace(/[^a-zA-Z0-9]/g,'_');

    const header = document.createElement('div');
    header.className = 'cat-header';
    header.innerHTML = `<span>${cat}</span><span class="cat-stats" id="cst_${tests[0].id}">${tests.length} tests</span>`;
    sec.appendChild(header);

    const table = document.createElement('table');
    table.className = 'test-table';
    table.innerHTML = `<thead><tr>
      <th style="width:40px">ID</th>
      <th style="width:30%">Query</th>
      <th style="width:22%">Expected Top Law</th>
      <th style="width:22%">Got (Top Result)</th>
      <th style="width:60px">Conf</th>
      <th style="width:70px">Status</th>
    </tr></thead><tbody id="tbody_${cat.replace(/[^a-zA-Z0-9]/g,'_')}"></tbody>`;
    sec.appendChild(table);
    container.appendChild(sec);

    tests.forEach(t => {
      const tr = document.createElement('tr');
      tr.className = 'pending';
      tr.id = 'tr_' + t.id;
      tr.setAttribute('data-cat', cat);
      tr.setAttribute('data-query', t.query.toLowerCase());
      tr.setAttribute('data-expected', t.expectedTop ? t.expectedTop.toLowerCase() : '');
      tr.innerHTML = `
        <td><strong>${t.id}</strong></td>
        <td><div class="query-text">${escHtml(t.query)}${t.note ? `<div style="font-size:10px;color:#999;margin-top:3px;font-style:italic">${escHtml(t.note)}</div>`:''}</div></td>
        <td><div class="expected-text">${t.expectedTop ? escHtml(t.expectedTop) : '<span style="color:#999">None (negative test)</span>'}</div></td>
        <td id="got_${t.id}" class="got-text">—</td>
        <td id="conf_${t.id}" class="conf-score">—</td>
        <td id="status_${t.id}"><span class="badge-pending">PENDING</span></td>`;
      document.getElementById('tbody_' + cat.replace(/[^a-zA-Z0-9]/g,'_')).appendChild(tr);
    });
  });

  document.getElementById('headerSub').textContent = `${TESTS.length} test cases across ${cats.length} law categories`;
  document.getElementById('statTotal').textContent = TESTS.length;
}

async function runAllTests(){
  // Guard: verify laws-client.js loaded correctly
  if (typeof window.analyzeMultipleLaws !== 'function') {
    alert('⚠️ laws-client.js did not load.\n\nMake sure laws-client.js is in the same folder as this HTML file (test-bed/), then reload the page.');
    return;
  }

  const btn = document.querySelector('.btn-run');
  btn.textContent = '⏳ Running...';
  btn.disabled = true;

  let pass=0, fail=0, warn=0;
  const bar = document.getElementById('progressBar');
  const lbl = document.getElementById('progressLabel');

  for(let i=0; i<TESTS.length; i++){
    const t = TESTS[i];
    const result = runSingleTest(t);
    results[t.id] = result;

    const tr = document.getElementById('tr_' + t.id);
    const gotEl = document.getElementById('got_' + t.id);
    const confEl = document.getElementById('conf_' + t.id);
    const statusEl = document.getElementById('status_' + t.id);

    tr.className = result.status;
    gotEl.textContent = result.gotTop || '(no match)';
    gotEl.className = result.status === 'fail' ? 'got-fail' : 'got-text';
    confEl.textContent = result.gotConf ? result.gotConf + '%' : '—';

    if(result.status === 'pass'){
      pass++;
      statusEl.innerHTML = '<span class="badge-pass">✅ PASS</span>';
    } else if(result.status === 'warn'){
      warn++;
      statusEl.innerHTML = `<span class="badge-warn">⚠️ WARN</span><div style="font-size:9px;color:#999;margin-top:2px">${escHtml(result.warnReason||'')}</div>`;
    } else {
      fail++;
      statusEl.innerHTML = `<span class="badge-fail">❌ FAIL</span><div style="font-size:9px;color:var(--fail);margin-top:2px">${escHtml(result.failReason||'')}</div>`;
    }

    // Update stats
    document.getElementById('statPass').textContent = pass;
    document.getElementById('statFail').textContent = fail;
    document.getElementById('statWarn').textContent = warn;
    bar.style.width = ((i+1)/TESTS.length*100) + '%';
    lbl.textContent = `Running ${i+1}/${TESTS.length} — ${t.id}: ${t.query.substring(0,50)}...`;

    // Yield to browser
    if(i % 10 === 0) await new Promise(r => setTimeout(r, 0));
  }

  bar.style.width = '100%';
  lbl.textContent = `Complete: ${pass} pass · ${fail} fail · ${warn} warn`;
  btn.textContent = '▶ Run All Tests';
  btn.disabled = false;

  const total = TESTS.length;
  const pct = Math.round((pass/total)*100);
  const summaryBox = document.getElementById('summaryBox');
  const pctRing = document.getElementById('pctRing');
  const summaryDetail = document.getElementById('summaryDetail');
  summaryBox.classList.remove('hidden');
  pctRing.textContent = pct + '%';
  pctRing.className = 'pct-ring ' + (pct >= 85 ? 'good' : pct >= 70 ? 'ok' : 'bad');
  summaryDetail.innerHTML = `${pass} passed · ${fail} failed · ${warn} warnings<br/>${total} total tests · ${TESTS.filter(t=>t.cat.includes('Cross-Category')).length} negative/cross-category tests`;
  summaryBox.scrollIntoView({behavior:'smooth'});

  applyFilter();
}

function runSingleTest(t){
  let laws;
  try {
    laws = window.analyzeMultipleLaws(t.query);
  } catch(e) {
    return { status:'fail', gotTop:'ERROR: '+e.message, gotConf:0, failReason:'analyzeMultipleLaws threw: '+e.message };
  }

  const top = laws[0];
  const gotTop = top ? top.caseType : null;
  const gotConf = top ? (top.confidence||0) : 0;
  const allGotTypes = laws.map(l=>l.caseType);

  // Check mustExclude
  for(const ex of (t.mustExclude||[])){
    if(allGotTypes.some(g => g.toLowerCase().includes(ex.toLowerCase().substring(0,20)))){
      return { status:'fail', gotTop, gotConf, failReason:`MUST NOT match "${ex}" but it did` };
    }
  }

  // Negative test (expectedTop is null)
  if(t.expectedTop === null){
    // Should have no high-confidence result
    if(top && gotConf >= 40){
      return { status:'warn', gotTop, gotConf, warnReason:`Non-legal query returned "${gotTop}" @ ${gotConf}%` };
    }
    return { status:'pass', gotTop, gotConf };
  }

  // Check expectedTop appears in top 3
  const top3 = laws.slice(0,3).map(l=>l.caseType.toLowerCase());
  const expectedNorm = t.expectedTop.toLowerCase();
  const inTop1 = gotTop && gotTop.toLowerCase() === expectedNorm;
  const inTop3 = top3.some(g => g === expectedNorm);

  if(!inTop3){
    return { status:'fail', gotTop, gotConf, failReason:`Expected "${t.expectedTop}" not in top 3. Got: ${allGotTypes.slice(0,3).join(' | ')}` };
  }

  // Check mustInclude
  for(const inc of (t.mustInclude||[])){
    if(!allGotTypes.some(g => g.toLowerCase().includes(inc.toLowerCase().substring(0,20)))){
      return { status:'warn', gotTop, gotConf, warnReason:`Expected "${inc}" to also appear but it didn't` };
    }
  }

  if(!inTop1){
    return { status:'warn', gotTop, gotConf, warnReason:`"${t.expectedTop}" in top 3 but not #1 (got "${gotTop}")` };
  }

  return { status:'pass', gotTop, gotConf };
}

function setFilter(f, el){
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function applyFilter(){
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  document.querySelectorAll('.test-table tbody tr').forEach(tr => {
    const status = tr.className;
    const query = tr.getAttribute('data-query')||'';
    const expected = tr.getAttribute('data-expected')||'';
    const matchFilter = currentFilter === 'all' || status === currentFilter;
    const matchSearch = !search || query.includes(search) || expected.includes(search);
    tr.classList.toggle('hidden', !matchFilter || !matchSearch);
  });
}

function resetTests(){
  results = {};
  document.querySelectorAll('.test-table tbody tr').forEach(tr => {
    const id = tr.id.replace('tr_','');
    tr.className = 'pending';
    const got = document.getElementById('got_'+id);
    const conf = document.getElementById('conf_'+id);
    const stat = document.getElementById('status_'+id);
    if(got) got.textContent = '—';
    if(conf) conf.textContent = '—';
    if(stat) stat.innerHTML = '<span class="badge-pending">PENDING</span>';
  });
  document.getElementById('statPass').textContent = 0;
  document.getElementById('statFail').textContent = 0;
  document.getElementById('statWarn').textContent = 0;
  document.getElementById('progressBar').style.width = '0';
  document.getElementById('progressLabel').textContent = 'Click "Run All Tests" to begin';
  document.getElementById('summaryBox').classList.add('hidden');
  applyFilter();
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
buildUI();
</script>
