// ─────────────────────────────────────────────
// HELPER FUNCTIONS mirroring index.html logic
// ─────────────────────────────────────────────

function getReportDiscount(store) {
  // store is a mock of localStorage
  try {
    const raw = store && store['sl_report_discount'];
    if (!raw) return null;
    const d = JSON.parse(raw);
    if (!d) return null;
    if (new Date() > new Date(d.expiry)) return null;
    return d;
  } catch(e) { return null; }
}

function deduplicateQs(questions) {
  const seen = new Set();
  return questions.filter(q => {
    const norm = q.q.toLowerCase().trim();
    if (seen.has(norm)) return false;
    seen.add(norm);
    return true;
  });
}

function validateEmail(email) {
  if (!email || !email.trim()) return false;
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim());
}

function validatePhone(phone) {
  if (!phone) return false;
  const digits = phone.replace(/\D/g,'');
  return digits.length === 10;
}

function validateQuery(query) {
  if (!query || typeof query !== 'string') return false;
  const t = query.trim();
  if (t.length < 10) return false;
  if (t.length > 2000) return false;
  return true;
}

function validateOTP(otp) {
  if (!otp || typeof otp !== 'string') return false;
  return /^\d{6}$/.test(otp.trim());
}

function calcFinalPrice(plan, discountStore) {
  const base = plan === 'report' ? 499 : 2500;
  if (plan === 'consult') {
    const discount = getReportDiscount(discountStore);
    if (discount) return base - discount.amount;
  }
  return base;
}

function getPlanBadgeText(plan, discountStore) {
  if (plan === 'report') return '📋 Detailed Legal Report — ₹499';
  const discount = getReportDiscount(discountStore);
  if (discount) return `🧑‍⚖️ Expert Consultation — ₹${2500 - discount.amount}`;
  return '🧑‍⚖️ Expert Consultation — ₹2500';
}

function canProceedFromStep(step, state) {
  switch(step) {
    case 1: return validateQuery(state.query);
    case 2: return state.selectedLaws && state.selectedLaws.length > 0;
    case 3: return state.selectedLaws && state.selectedLaws.length > 0;
    case 4: return true; // assessment is optional
    case 5: return true; // evidence is optional
    default: return false;
  }
}

function toggleLawSelection(selected, law) {
  const idx = selected.indexOf(law);
  if (idx === -1) return [...selected, law];
  return selected.filter(l => l !== law);
}

function makeDiscountStore(amount, daysFromNow) {
  const expiry = new Date(Date.now() + daysFromNow * 24 * 60 * 60 * 1000).toISOString();
  return {
    'sl_report_discount': JSON.stringify({
      amount, code: 'RPT500', expiry,
      createdAt: new Date().toISOString()
    })
  };
}

function makeExpiredStore() {
  const expiry = new Date(Date.now() - 1000).toISOString();
  return {
    'sl_report_discount': JSON.stringify({ amount: 500, code: 'RPT500', expiry })
  };
}

// ─────────────────────────────────────────────
// ENGINE WRAPPER
// ─────────────────────────────────────────────
function analyze(query) {
  try {
    return window.analyzeMultipleLaws(query) || [];
  } catch(e) { return []; }
}

// Engine uses caseType as the law name field
function getLaw(r) {
  return r.caseType || r.law || null;
}

function topLaw(query) {
  const r = analyze(query);
  return r.length > 0 ? getLaw(r[0]) : null;
}

function topConf(query) {
  const r = analyze(query);
  return r.length > 0 ? r[0].confidence : 0;
}

// ─────────────────────────────────────────────
// TEST RUNNER
// ─────────────────────────────────────────────

let currentFilter = 'all';
let results = [];

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btns button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderResults(results);
}

async function runAll() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  document.getElementById('status').textContent = '⏳ Running ' + TESTS.length + ' tests...';

  results = [];
  let pass = 0, fail = 0;

  for (let i = 0; i < TESTS.length; i++) {
    const t = TESTS[i];
    const r = runTest(t);
    results.push(r);
    if (r.status === 'pass') pass++; else fail++;
    if (i % 50 === 0) {
      await new Promise(res => setTimeout(res, 0));
      document.getElementById('status').textContent = `⏳ Running... ${i+1}/${TESTS.length}`;
    }
  }

  const total = pass + fail;
  const pct = total > 0 ? ((pass/total)*100).toFixed(2) : '0.00';

  document.getElementById('sTotal').textContent = total;
  document.getElementById('sPass').textContent = pass;
  document.getElementById('sFail').textContent = fail;
  document.getElementById('sRate').textContent = pct + '%';

  document.getElementById('status').textContent =
    `✅ Done — ${pass}/${total} passed (${pct}%) — ${fail} failed`;

  btn.disabled = false;
  btn.textContent = '▶ Run All Tests';

  renderResults(results);
}

function runTest(t) {
  try {
    if (t.type === 'law_map') {
      const results = analyze(t.query);
      const top = results.length > 0 ? getLaw(results[0]) : null;
      const pass = top === t.expectedTop;
      return {
        ...t, status: pass ? 'pass' : 'fail',
        actual: top,
        detail: pass ? '' : `Expected: "${t.expectedTop}" | Got: "${top}"`
          + (results.length > 0 ? ` (conf:${results[0].confidence}, top3:[${results.slice(0,3).map(r=>getLaw(r)||'?').map(s=>s.split('–')[0].trim()).join(', ')}])` : '')
      };
    }

    if (t.type === 'must_not_include') {
      const res = analyze(t.query);
      const threshold = t.confThreshold || 30;
      const bad = res.find(r => (getLaw(r)||'').toLowerCase().includes(t.mustNotInclude.toLowerCase()) && r.confidence > threshold);
      const pass = !bad;
      return {
        ...t, status: pass ? 'pass' : 'fail',
        actual: bad ? `${getLaw(bad)} (conf:${bad.confidence})` : 'not present',
        detail: pass ? '' : `"${t.mustNotInclude}" appeared with conf ${bad.confidence} (max: ${threshold}). Law: ${getLaw(bad)}`
      };
    }

    if (t.type === 'confidence_min') {
      const res = analyze(t.query);
      const top = res.length > 0 ? res[0] : null;
      const pass = top && top.confidence >= t.minConf;
      return {
        ...t, status: pass ? 'pass' : 'fail',
        actual: top ? `${getLaw(top)} (${top.confidence})` : 'no result',
        detail: pass ? '' : `Need conf≥${t.minConf}, got ${top ? top.confidence : 'N/A'}. Law: ${top ? getLaw(top) : 'none'}`
      };
    }

    if (t.type === 'all_in_top5') {
      const res = analyze(t.query);
      const top5Laws = res.slice(0, 5).map(r => getLaw(r) || '');
      const missing = t.mustInclude.filter(substr =>
        !top5Laws.some(l => l.toLowerCase().includes(substr.toLowerCase()))
      );
      const pass = missing.length === 0;
      return {
        ...t, status: pass ? 'pass' : 'fail',
        actual: top5Laws.join(' | '),
        detail: pass ? '' : `Missing in top5: [${missing.join(', ')}]. Got: [${top5Laws.slice(0,3).join(', ')}]`
      };
    }

    if (t.type === 'low_conf_only') {
      const res = analyze(t.query);
      const top = res.length > 0 ? res[0] : null;
      const pass = !top || top.confidence <= t.maxConf;
      return {
        ...t, status: pass ? 'pass' : 'fail',
        actual: top ? `${getLaw(top)} (${top.confidence})` : 'no result',
        detail: pass ? '' : `Expected conf≤${t.maxConf}, got ${top.confidence}. Law: ${getLaw(top)}`
      };
    }

    if (t.type === 'js_unit') {
      let passed = false;
      let errMsg = '';
      try {
        passed = !!t.fn();
      } catch(e) {
        errMsg = e.message;
      }
      return {
        ...t, status: passed ? 'pass' : 'fail',
        actual: passed ? 'true' : ('false' + (errMsg ? ` (${errMsg})` : '')),
        detail: passed ? '' : `Unit test returned false. ${errMsg}`
      };
    }

    return { ...t, status: 'skip', actual: 'unknown type', detail: `Unknown test type: ${t.type}` };
  } catch(e) {
    return { ...t, status: 'fail', actual: 'ERROR', detail: 'Exception: ' + e.message };
  }
}

// RENDER
// ─────────────────────────────────────────────

function renderResults(results) {
  if (!results || !results.length) return;

  let filtered = results;
  if (currentFilter === 'pass') filtered = results.filter(r => r.status === 'pass');
  else if (currentFilter === 'fail') filtered = results.filter(r => r.status === 'fail');
  else if (['law_map','must_not_include','confidence_min','all_in_top5','low_conf_only','js_unit'].includes(currentFilter)) {
    filtered = results.filter(r => r.type === currentFilter);
  }

  // Group by category
  const cats = {};
  filtered.forEach(r => {
    const key = r.type + '::' + (r.cat || 'General');
    if (!cats[key]) cats[key] = { type: r.type, cat: r.cat || 'General', items: [] };
    cats[key].items.push(r);
  });

  const html = Object.values(cats).map(group => {
    const pass = group.items.filter(i => i.status === 'pass').length;
    const total = group.items.length;
    const pct = total > 0 ? Math.round(pass/total*100) : 0;

    const rows = group.items.map(r => {
      const rowCls = r.status === 'pass' ? 'pass-row' : r.status === 'fail' ? 'fail-row' : '';
      const badge = `<span class="badge ${r.status}">${r.status.toUpperCase()}</span>`;
      const typeTag = `<span class="type-tag ${r.type}">${r.type}</span>`;

      let query = '';
      if (r.type === 'js_unit') {
        query = `<code style="font-size:.78rem">${esc(r.desc || r.id)}</code>`;
      } else {
        query = `<span style="color:#333">${esc(r.query||'')}</span>`;
      }

      const expected = r.type === 'law_map' ? esc(r.expectedTop||'') :
                       r.type === 'must_not_include' ? `must NOT include: <em>${esc(r.mustNotInclude||'')}</em> (conf≤${r.confThreshold||30})` :
                       r.type === 'confidence_min' ? `conf ≥ ${r.minConf}` :
                       r.type === 'all_in_top5' ? `top5 must include: <em>${esc((r.mustInclude||[]).join(', '))}</em>` :
                       r.type === 'low_conf_only' ? `conf ≤ ${r.maxConf}` :
                       r.type === 'js_unit' ? 'fn() returns true' : '';

      const detail = r.detail ? `<div class="err-detail">⚠ ${esc(r.detail)}</div>` : '';

      return `<tr class="${rowCls}">
        <td><strong style="font-size:.78rem;color:#888">${r.id}</strong></td>
        <td>${typeTag}</td>
        <td>${query}</td>
        <td>${expected}</td>
        <td>${esc(r.actual||'')}</td>
        <td>${badge}${detail}</td>
      </tr>`;
    }).join('');

    return `<div class="section">
      <div class="sec-header">
        <span class="sec-title">${group.type} — ${group.cat}</span>
        <span class="sec-badge ${pass===total?'pass':'fail'}">${pass}/${total}</span>
        <div class="sec-progress"><div class="sec-progress-fill" style="width:${pct}%"></div></div>
      </div>
      <table class="tests-table">
        <thead><tr>
          <th>ID</th><th>Type</th><th>Query / Description</th>
          <th>Expected</th><th>Actual</th><th>Result</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  document.getElementById('results').innerHTML = html || '<p style="padding:20px;color:#888">No tests match current filter.</p>';
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Auto-run on load
window.addEventListener('load', () => {
  setTimeout(runAll, 200);
});
</script>
</body>
</html>
